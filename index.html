<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<style>
body{font-family:monospace;background:#0f0f0f;color:#fff;padding:20px}
input,button{padding:5px;margin:5px;width:300px}
.card{margin:10px 0;padding:10px;background:#1f1f1f;border-radius:5px}
</style>
</head>
<body>

<h1>Telegram Auto-Add PRO MAX 🚀</h1>

<div class="card">
<h3>Export Members Live</h3>
<input id="exportGroupInput" placeholder="Group username (e.g. facetoryoutlet360)">
<button id="exportBtn">Export Members</button>
<div id="exportResult"></div>
</div>

<div class="card">
<h3>Add Member</h3>
<input id="sourceGroupInput" placeholder="Source Group username">
<input id="targetGroupInput" placeholder="Target Group username">
<button id="addMemberBtn">Add Members</button>
<div id="addResult"></div>
</div>

<div class="card">
<h3>History / Logs</h3>
<button id="loadHistoryBtn">Load History</button>
<div id="historyResult"></div>
</div>

<script>
const exportBtn=document.getElementById('exportBtn')
const exportGroupInput=document.getElementById('exportGroupInput')
const exportResult=document.getElementById('exportResult')

exportBtn.onclick=async()=>{
  const group=exportGroupInput.value.trim()
  if(!group) return alert("Enter group username")
  exportResult.innerText="Fetching members..."
  await fetch('/members-live',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group})})
  const link = document.createElement('a')
  link.href=`/export/${group}`
  link.innerText="Download JSON"
  exportResult.innerHTML=""; exportResult.appendChild(link)
}

// Add member button logic (simplified)
const addMemberBtn=document.getElementById('addMemberBtn')
const sourceGroupInput=document.getElementById('sourceGroupInput')
const targetGroupInput=document.getElementById('targetGroupInput')
const addResult=document.getElementById('addResult')

addMemberBtn.onclick=async()=>{
  const src=sourceGroupInput.value.trim()
  const tgt=targetGroupInput.value.trim()
  if(!src||!tgt) return alert("Enter both groups")
  addResult.innerText="Scraping members..."
  const res = await fetch('/members-live',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group:src})})
  const data=await res.json()
  if(data.error){addResult.innerText="Error: "+data.error; return}
  addResult.innerText="Adding members..."
  for(const m of data.members || data){
    await fetch('/add-member',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:m.username,user_id:m.user_id,access_hash:m.access_hash,targetGroup:tgt})})
    addResult.innerText=`Added: ${m.username||m.user_id}`
    await new Promise(r=>setTimeout(r,2000))
  }
  addResult.innerText+="\nDone."
}

// History
document.getElementById('loadHistoryBtn').onclick=async()=>{
  const res=await fetch('/history')
  const data=await res.json()
  const div=document.getElementById('historyResult')
  div.innerHTML=JSON.stringify(data,null,2)
}
</script>
</body>
</html>
