<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;padding:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,0.6);}
.card-title{font-size:24px;font-weight:700;margin-bottom:15px;color:#00ff7f;text-align:center;}
input, select{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:#11141f;color:#fff;font-size:15px;outline:none;}
input:focus, select:focus{border:1px solid #00ff7f;}
button{border:none;padding:12px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;background:#00ff7f;color:#0f0f10;transition:0.2s;}
button:hover{background:#00cc66;color:#fff;}
button:disabled{background:#ff4c4c;color:#fff;cursor:not-allowed;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px;}
.btn-group button{flex:1;background:#11141f;color:#fff;}
.btn-group button:hover{background:#00ff7f;color:#0f0f10;}
.success{color:#00ff7f;font-weight:700;}
.failed{color:#ff4c4c;font-weight:700;}
.pending{color:#ffcc00;font-weight:700;}
.skipped{color:#9999ff;font-weight:700;}
.floodwait{background:#ffcc00;color:#000;font-weight:700;border-radius:6px;animation:blink 1.5s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0.5;}}
.avatar{width:28px;height:28px;border-radius:50%;margin-right:8px;}
ul{list-style:none;padding:0;margin-top:10px;max-height:400px;overflow-y:auto;}
li{padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.table-responsive{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#11141f;color:#00ff7f;}
.page{display:none;}
.page.active{display:block;}
.progress-bar{background:#11141f;height:14px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:14px;width:0%;border-radius:10px;transition:width 0.3s;}
.spinner{text-align:center;margin-top:10px;}
#autoAddStatus{margin:10px 0;font-weight:700;color:#00ff7f;text-align:center;}
.countdown{font-weight:700;}
.green{color:#00ff7f;}
.yellow{color:#ffcc00;}
.red{color:#ff4c4c;}
.console-log{background:#11141f;padding:10px;border-radius:12px;height:200px;overflow-y:auto;font-size:13px;margin-top:10px;}
#floodAlert{color:red;font-weight:700;margin-top:5px;display:none;}
.analytics{display:flex;gap:15px;margin-bottom:10px;justify-content:center;}
.analytics div{padding:8px 12px;border-radius:8px;background:#11141f;color:#fff;font-weight:700;}
.green-box{background:#00ff7f;color:#000;}
.yellow-box{background:#ffcc00;color:#000;}
.red-box{background:#ff4c4c;color:#fff;}
.blue-box{background:#9999ff;color:#fff;}
</style>
</head>
<body>
<div class="container">

<!-- Navigation -->
<div class="btn-group">
<button class="nav-btn" data-page="accountsPage">Accounts</button>
<button class="nav-btn" data-page="membersPage">Auto Add</button>
<button class="nav-btn" data-page="uploadPage">Upload</button>
<button class="nav-btn" data-page="historyPage">History</button>
</div>

<!-- Accounts -->
<section id="accountsPage" class="page active">
<div class="card-title">Accounts Status</div>
<div class="analytics">
<div class="green-box" id="activeCount">Active: 0</div>
<div class="yellow-box" id="floodCount">FloodWait: 0</div>
<div class="red-box" id="errorCount">Error: 0</div>
</div>
<div class="table-responsive">
<table>
<thead>
<tr>
<th>ID</th><th>Phone</th><th>Status</th><th>FloodWait</th><th>Last Checked</th>
</tr>
</thead>
<tbody id="accountsTable"></tbody>
</table>
</div>
</section>

<!-- Auto Add -->
<section id="membersPage" class="page">
<div class="card-title">Auto Add Members</div>
<div class="analytics">
<div class="green-box" id="addedCount">Added: 0</div>
<div class="yellow-box" id="skippedCount">Skipped: 0</div>
<div class="red-box" id="failedCount">Failed: 0</div>
</div>
<label for="accountSelect">Select Account (optional):</label>
<select id="accountSelect"></select>
<div id="floodAlert">FloodWait Active 🚫</div>
<input id="sourceGroupInput" placeholder="Source Group">
<input id="targetGroupInput" placeholder="Target Group">
<button id="startAutoAddBtn">Start Auto-Add</button>
<div id="loading" class="spinner">⏳ Loading Members...</div>
<div id="autoAddStatus"></div>
<div id="autoAddCounter">0 / 0</div>
<div class="progress-bar"><div id="autoAddProgress" class="progress"></div></div>
<ul id="autoAddList"></ul>
<div class="console-log" id="autoAddConsole"></div>
</section>

<!-- Upload -->
<section id="uploadPage" class="page">
<div class="card-title">Upload Accounts</div>
<input id="phoneInput" placeholder="Phone +855">
<input id="apiIdInput" placeholder="API ID">
<input id="apiHashInput" placeholder="API HASH">
<input id="sessionInput" placeholder="Session String">
<button id="addAccountBtn">Add Account</button><br><br>
<input type="file" id="file" accept=".txt">
<button id="uploadBtn">Upload File</button>
<div id="uploadStats"></div>
</section>

<!-- History -->
<section id="historyPage" class="page">
<div class="card-title">History</div>
<ul id="historyList"></ul>
<button id="downloadHistoryBtn">Download History</button>
</section>

</div>

<script>
// ===== Navigation =====
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.onclick=()=>{document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); document.getElementById(btn.dataset.page).classList.add("active");}
});

// ===== Accounts Table & Analytics =====
const accountsTable=document.getElementById("accountsTable");
const activeCount=document.getElementById("activeCount");
const floodCount=document.getElementById("floodCount");
const errorCount=document.getElementById("errorCount");

async function fetchAccounts(){
  try{
    const res=await fetch("/account-status"); if(!res.ok) return;
    const data=await res.json();
    const now=Date.now();
    let active=0,flood=0,error=0;
    accountsTable.innerHTML="";
    Object.keys(data).forEach(id=>{
      const acc=data[id];
      let floodText="-", countdownClass="green";
      if(acc.floodWaitUntil && acc.floodWaitUntil>now){
        const remain=Math.floor((acc.floodWaitUntil-now)/1000);
        const readyTime = new Date(acc.floodWaitUntil).toLocaleString('en-US',{timeZone:'Asia/Phnom_Penh',hour12:true});
        floodText=`${remain}s remaining | Ready: ${readyTime}`;
        countdownClass="red"; flood++;
      }else if(acc.status==="active"){ active++ } else{ error++ }
      const lastChecked = new Date(acc.lastChecked||now).toLocaleString('en-US',{timeZone:'Asia/Phnom_Penh',hour12:true});
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${id}</td><td>${acc.phone}</td><td>${acc.status}</td><td class="countdown ${countdownClass}">${floodText}</td><td>${lastChecked}</td>`;
      accountsTable.appendChild(tr);
    });
    activeCount.innerText=`Active: ${active}`;
    floodCount.innerText=`FloodWait: ${flood}`;
    errorCount.innerText=`Error: ${error}`;
  }catch(e){console.log(e);}
}
setInterval(fetchAccounts,1000); fetchAccounts();

// ===== Accounts Dropdown & Flood =====
const accountSelect=document.getElementById("accountSelect");
const startAutoAddBtn=document.getElementById("startAutoAddBtn");
const floodAlert=document.getElementById("floodAlert");

async function loadAccountsDropdown(){
  try{
    const res=await fetch("/account-status"); if(!res.ok) return;
    const data=await res.json();
    accountSelect.innerHTML="";
    let anyFlood=false;
    const now=Date.now();
    Object.keys(data).forEach(id=>{
      const acc=data[id];
      const option=document.createElement("option");
      option.value=id;
      option.text=`${acc.phone} (${acc.status})`;
      if(acc.floodWaitUntil && acc.floodWaitUntil>now){
        option.disabled=true; anyFlood=true;
        const remain=Math.floor((acc.floodWaitUntil-now)/1000);
        const readyTime=new Date(acc.floodWaitUntil).toLocaleString('en-US',{timeZone:'Asia/Phnom_Penh',hour12:true});
        option.text += ` [${remain}s | Ready ${readyTime}]`;
        option.title = `FloodWait ${remain}s\nReady: ${readyTime}`;
      }
      accountSelect.appendChild(option);
    });
    startAutoAddBtn.disabled = anyFlood;
    floodAlert.style.display = anyFlood ? "block" : "none";
  }catch(e){console.log(e);}
}
setInterval(loadAccountsDropdown,1000); loadAccountsDropdown();


  // ===== Helper: Check Chinese characters =====
function hasChineseChars(str){
  if(!str) return false;
  return /[\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF]/.test(str);
}

// ===== Auto Add Members =====
const autoAddList = document.getElementById("autoAddList"),
      counter = document.getElementById("autoAddCounter"),
      progress = document.getElementById("autoAddProgress"),
      autoAddStatus = document.getElementById("autoAddStatus"),
      loading = document.getElementById("loading"),
      autoAddConsole = document.getElementById("autoAddConsole"),
      sourceGroupInput = document.getElementById("sourceGroupInput"),
      targetGroupInput = document.getElementById("targetGroupInput");

startAutoAddBtn.onclick = async () => {
  const source = sourceGroupInput.value.trim(),
        target = targetGroupInput.value.trim();
  if(!source || !target) return alert("Enter Source and Target groups");

  loading.style.display = "block";
  autoAddStatus.innerText = "Fetching members...";
  autoAddConsole.innerHTML = "";

  // Fetch members from source
  const res = await fetch("/members", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({group:source})
  });
  const members = await res.json();
  loading.style.display = "none";
  if(members.error){ alert(members.error); return; }

  // Fetch accounts
  const accRes = await fetch("/account-status"); 
  const accData = await accRes.json();
  let accountsList = Object.keys(accData), accIndex = 0, processed = 0, skippedCount = 0;

  // Fetch history
  const histRes = await fetch("/history");
  const histData = await histRes.json();
  const histList = Object.values(histData||{});

  autoAddList.innerHTML = "";
  counter.innerText = `0 / ${members.length}`;
  progress.style.width = `0%`;

  // Find next available account
  function getNextAvailableAccount(startIndex){
    const now = Date.now();
    for(let i=0;i<accountsList.length;i++){
      let idx = (startIndex+i)%accountsList.length;
      const acc = accData[accountsList[idx]];
      if(acc.status === "active" && (!acc.floodWaitUntil || acc.floodWaitUntil <= now)){
        return idx;
      }
    }
    return -1;
  }

  for(let i=0; i<members.length; i++){
    const m = members[i];

    // ===== Skip Chinese names =====
    if(hasChineseChars(m.first_name) || hasChineseChars(m.last_name)){
      skippedCount++;
      logConsole(`[SKIP] ${m.username||m.user_id} → Name contains Chinese characters`);
      counter.innerText = `${i+1} / ${members.length}`;
      progress.style.width = `${Math.floor((i+1)/members.length*100)}%`;
      continue;
    }

    // ===== Skip history =====
    const alreadyHistory = histList.some(h => (h.username===m.username || h.user_id===m.user_id) && h.status==="success");
    if(alreadyHistory){
      skippedCount++;
      logConsole(`[SKIP] ${m.username||m.user_id} → Already in history`);
      counter.innerText = `${i+1} / ${members.length}`;
      progress.style.width = `${Math.floor((i+1)/members.length*100)}%`;
      continue;
    }

    // ===== Select available account =====
    let nextAccIdx = getNextAvailableAccount(accIndex);
    if(nextAccIdx === -1){
      autoAddStatus.innerText = "All accounts FloodWait. Waiting...";
      await new Promise(r=>setTimeout(r,5000));
      nextAccIdx = getNextAvailableAccount(accIndex);
      if(nextAccIdx === -1) break;
    }
    accIndex = nextAccIdx;
    const currentAccount = accountsList[accIndex];

    logConsole(`[INFO] Using ${currentAccount} for ${m.username||m.user_id}`);

    // ===== Add member =====
    const addRes = await fetch("/add-member",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:m.username,user_id:m.user_id,access_hash:m.access_hash,targetGroup:target})
    });
    const result = await addRes.json();

    // ===== Update UI =====
    const li = document.createElement("li");
    li.innerHTML = `<img class="avatar" src="${m.avatar}" onerror="this.src='https://via.placeholder.com/40?text=U'"> ${m.username||m.user_id} → <span class="${result.status==='success'?'success':result.status==='skipped'?'skipped':'failed'}">${result.status}</span> by ${result.accountUsed} <span class="pending">[${new Date().toLocaleTimeString()}]</span><br><span class="pending">Reason: ${result.reason||'N/A'}</span>`;
    autoAddList.appendChild(li); autoAddList.scrollTop = autoAddList.scrollHeight;

    processed++;
    counter.innerText = `${processed} / ${members.length}`;
    progress.style.width = `${Math.floor((processed/members.length)*100)}%`;

    // ===== Wait if success =====
    if(result.status==="success"){
      const delay = 30000 + Math.floor(Math.random()*10000); // 30–40s
      let countdown = Math.floor(delay/1000);
      autoAddStatus.innerText = `Waiting ${countdown}s before next add...`;
      const interval = setInterval(()=>{
        countdown--;
        autoAddStatus.innerText = `Waiting ${countdown}s before next add...`;
        if(countdown<=0){ clearInterval(interval); autoAddStatus.innerText = "Resuming Auto Add..."; }
      },1000);
      await new Promise(r=>setTimeout(r, delay));
    }

    // Rotate account
    if(result.status==="success" || (result.reason && result.reason.includes("FloodWait"))) accIndex=(accIndex+1)%accountsList.length;
  }

  autoAddStatus.innerText = `Auto Add Finished! ✅ Skipped: ${skippedCount}`;
  alert(`Auto Add Finished! Skipped ${skippedCount} members`);
};
</script>
</body>
</html>
