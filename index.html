<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;padding:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,0.6);}
.card-title{font-size:24px;font-weight:700;margin-bottom:15px;color:#00ff7f;text-align:center;}
input, select{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:#11141f;color:#fff;font-size:15px;outline:none;}
input:focus, select:focus{border:1px solid #00ff7f;}
button{border:none;padding:12px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;background:#00ff7f;color:#0f0f10;transition:0.2s;}
button:hover{background:#00cc66;color:#fff;}
button:disabled{background:#ff4c4c;color:#fff;cursor:not-allowed;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px;}
.btn-group button{flex:1;background:#11141f;color:#fff;}
.btn-group button:hover{background:#00ff7f;color:#0f0f10;}
.success{color:#00ff7f;font-weight:700;}
.failed{color:#ff4c4c;font-weight:700;}
.pending{color:#ffcc00;font-weight:700;}
.skipped{color:#9999ff;font-weight:700;}
.floodwait{background:#ffcc00;color:#000;font-weight:700;border-radius:6px;animation:blink 1.5s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0.5;}}
.avatar{width:28px;height:28px;border-radius:50%;margin-right:8px;}
ul{list-style:none;padding:0;margin-top:10px;max-height:400px;overflow-y:auto;}
li{padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.table-responsive{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#11141f;color:#00ff7f;}
.page{display:none;}
.page.active{display:block;}
.progress-bar{background:#11141f;height:14px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:14px;width:0%;border-radius:10px;transition:width 0.3s;}
.spinner{text-align:center;margin-top:10px;}
#autoAddStatus{margin:10px 0;font-weight:700;color:#00ff7f;text-align:center;}
.countdown{font-weight:700;}
.green{color:#00ff7f;}
.yellow{color:#ffcc00;}
.red{color:#ff4c4c;}
.console-log{background:#11141f;padding:10px;border-radius:12px;height:200px;overflow-y:auto;font-size:13px;margin-top:10px;}
#floodAlert{color:red;font-weight:700;margin-top:5px;display:none;}
td.success{color:#00ff7f;font-weight:700;}
td.failed{color:#ff4c4c;font-weight:700;}
td.floodwait{color:#ffcc00;font-weight:700;}
td.skipped{color:#9999ff;font-weight:700;}
</style>
</head>
<body>
<div class="container">

<!-- Navigation -->
<div class="btn-group">
<button class="nav-btn" data-page="accountsPage">Accounts</button>
<button class="nav-btn" data-page="membersPage">Auto Add</button>
<button class="nav-btn" data-page="uploadPage">Upload</button>
<button class="nav-btn" data-page="historyPage">History</button>
</div>

<!-- Accounts -->
<section id="accountsPage" class="page active">
<div class="card-title">Accounts Status</div>
<div class="table-responsive">
<table>
<thead>
<tr>
<th>ID</th><th>Phone</th><th>Status</th><th>FloodWait</th><th>Last Checked</th>
</tr>
</thead>
<tbody id="accountsTable"></tbody>
</table>
<button id="refreshAccountsBtn">Refresh Accounts</button>
</div>
</section>

<!-- Auto Add -->
<section id="membersPage" class="page">
<div class="card-title">Auto Add Members</div>
<label for="accountSelect">Select Account (optional):</label>
<select id="accountSelect"></select>
<div id="floodAlert">FloodWait Active 🚫</div>
<input id="sourceGroupInput" placeholder="Source Group">
<input id="targetGroupInput" placeholder="Target Group">
<button id="startAutoAddBtn">Start Auto-Add</button>
<div id="loading" class="spinner">⏳ Loading Members...</div>
<div id="autoAddStatus"></div>
<div id="autoAddCounter">0 / 0</div>
<div class="progress-bar"><div id="autoAddProgress" class="progress"></div></div>
<ul id="autoAddList"></ul>
<div class="console-log" id="autoAddConsole"></div>
</section>

<!-- Upload -->
<section id="uploadPage" class="page">
<div class="card-title">Upload Accounts</div>
<input id="phoneInput" placeholder="Phone +855">
<input id="apiIdInput" placeholder="API ID">
<input id="apiHashInput" placeholder="API HASH">
<input id="sessionInput" placeholder="Session String">
<button id="addAccountBtn">Add Account</button><br><br>
<input type="file" id="file" accept=".txt">
<button id="uploadBtn">Upload File</button>
<div id="uploadStats"></div>
</section>

<!-- History -->
<section id="historyPage" class="page">
<div class="card-title">History</div>
<div class="table-responsive">
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Status</th>
        <th>Account</th>
        <th>Reason</th>
        <th>Group</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</div>
<button id="downloadHistoryBtn">Download History</button>
</section>

</div>

<script>
// ===== Navigation =====
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.onclick=()=>{document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); document.getElementById(btn.dataset.page).classList.add("active");}
});

// ===== Helpers =====
function secondsToHHMMSS(seconds){
  const h=Math.floor(seconds/3600);
  const m=Math.floor((seconds%3600)/60);
  const s=seconds%60;
  return [h,m,s].map(v=>v.toString().padStart(2,'0')).join(':');
}

// ===== Accounts Table =====
const accountsTable=document.getElementById("accountsTable");
const accountFloodTimers={}; // countdown per account

async function fetchAccounts(){
  try{
    const res=await fetch("/account-status"); if(!res.ok) return;
    const data=await res.json();
    const now=Date.now();
    accountsTable.innerHTML="";
    Object.keys(data).forEach(id=>{
      const acc=data[id];
      const tr=document.createElement("tr");
      tr.dataset.id=id;

      // Countdown
      let floodText="-", countdownClass="green";
      if(acc.floodWaitUntil && acc.floodWaitUntil>now){
        const remain=Math.floor((acc.floodWaitUntil-now)/1000);
        accountFloodTimers[id] = remain; // store local countdown
        floodText = secondsToHHMMSS(remain); countdownClass="red";
      }

      const lastChecked = new Date(acc.lastChecked||now).toLocaleString('en-US',{timeZone:'Asia/Phnom_Penh',hour12:true});
      tr.innerHTML=`<td>${id}</td><td>${acc.phone}</td><td>${acc.status}</td><td class="countdown ${countdownClass}">${floodText}</td><td>${lastChecked}</td>`;
      accountsTable.appendChild(tr);
    });
  }catch(e){console.log(e);}
}

// Manual refresh
document.getElementById("refreshAccountsBtn").onclick = fetchAccounts;

fetchAccounts();

// ===== Accounts Dropdown + FloodWait =====
const accountSelect=document.getElementById("accountSelect");
const startAutoAddBtn=document.getElementById("startAutoAddBtn");
const floodAlert=document.getElementById("floodAlert");

async function loadAccountsDropdown(){
  try{
    const res=await fetch("/account-status"); if(!res.ok) return;
    const data=await res.json();
    accountSelect.innerHTML="";
    let anyFlood=false;
    const now = Date.now();
    Object.keys(data).forEach(id=>{
      const acc=data[id];
      const option=document.createElement("option");
      option.value=id; option.text=`${acc.phone} (${acc.status})`;
      if(acc.floodWaitUntil && acc.floodWaitUntil>now){
        option.disabled=true; anyFlood=true;
        const remain = Math.floor((acc.floodWaitUntil-now)/1000);
        option.text += ` [${secondsToHHMMSS(remain)}]`;
        option.title = `FloodWait ${secondsToHHMMSS(remain)}`;
      }
      accountSelect.appendChild(option);
    });
    startAutoAddBtn.disabled = false;
    floodAlert.style.display = anyFlood ? "block" : "none";
  }catch(e){console.log(e);}
}
loadAccountsDropdown();

// ===== FloodWait countdown update every second =====
setInterval(()=>{
  Object.keys(accountFloodTimers).forEach(id=>{
    if(accountFloodTimers[id]>0){
      accountFloodTimers[id]--;
      const td=document.querySelector(`#accountsTable tr[data-id='${id}'] .countdown`);
      if(td) td.innerText=secondsToHHMMSS(accountFloodTimers[id]);
    }
  });
},1000);

// ===== History Table FloodWait =====
const historyTable=document.getElementById("historyTable");
const historyFloodTimers={};

async function fetchHistory(){
  try{
    const res=await fetch("/history"); const data=await res.json();
    historyTable.innerHTML="";
    Object.values(data).forEach((h,index)=>{
      let category="success";
      if(h.status==="failed"){
        if(h.reason && h.reason.toLowerCase().includes("flood")) category="flood"; else category="failed";
      }
      if(h.status==="skipped") category="skipped";

      let label=category==="success"?"SUCCESS":category==="failed"?"ERROR":category==="flood"?"FLOOD":"SKIPPED";
      let colorClass=category==="success"?"success":category==="failed"?"failed":category==="flood"?"floodwait":"skipped";

      const d=new Date(h.timestamp);
      const date=d.toLocaleDateString('en-GB',{ timeZone:'Asia/Phnom_Penh' });
      const time=d.toLocaleTimeString('en-US',{ timeZone:'Asia/Phnom_Penh', hour12:true });
      const groupName=h.targetGroup||'N/A';

      let floodSec=0;
      const floodMatch=h.reason?h.reason.match(/(\d+)\s*seconds/i):null;
      if(floodMatch) floodSec=Number(floodMatch[1]);

      const rowId=`histRow${index}`;
      const tr=document.createElement("tr"); tr.id=rowId;
      tr.innerHTML=`<td>${h.username||h.user_id}</td>
                    <td class="${colorClass}"><b>${label}</b></td>
                    <td>${h.accountUsed||'N/A'}</td>
                    <td class="${floodSec>0?'flood-countdown':''}">${floodSec>0?secondsToHHMMSS(floodSec):h.reason||''}</td>
                    <td>${groupName}</td>
                    <td>${date}</td>
                    <td>${time}</td>`;
      historyTable.appendChild(tr);

      if(floodSec>0) historyFloodTimers[rowId]=floodSec;
    });
  }catch(e){console.log(e);}
}

// History countdown
setInterval(()=>{
  Object.keys(historyFloodTimers).forEach(rowId=>{
    if(historyFloodTimers[rowId]>0){
      historyFloodTimers[rowId]--;
      const td=document.querySelector(`#${rowId} .flood-countdown`);
      if(td) td.innerText=secondsToHHMMSS(historyFloodTimers[rowId]);
    }
  });
},1000);

setInterval(fetchHistory,5000); fetchHistory();

// ===== Download History =====
document.getElementById("downloadHistoryBtn").onclick=()=>{
  const rows=document.querySelectorAll("#historyTable tr");
  let csv="User,Status,Account,Reason,Group,Date,Time\n";
  rows.forEach(r=>{
    const cols=r.querySelectorAll("td");
    if(cols.length){
      csv+=Array.from(cols).map(c=>c.innerText.replace(/\n/g,"")).join(",")+"\n";
    }
  });
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="history.csv"; a.click();
};
</script>
</body>
</html>
