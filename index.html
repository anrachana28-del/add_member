<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Telegram Auto-Add PRO MAX 🚀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:#0f0f10;color:#fff;margin:0;padding:0;}
.container{max-width:1000px;margin:auto;padding:15px;}
section{background:#1e1e2a;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,0.6);}
.card-title{font-size:24px;font-weight:700;margin-bottom:15px;color:#00ff7f;text-align:center;}
input, select{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:#11141f;color:#fff;font-size:15px;outline:none;}
input:focus, select:focus{border:1px solid #00ff7f;}
button{border:none;padding:12px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;background:#00ff7f;color:#0f0f10;transition:0.2s;}
button:hover{background:#00cc66;color:#fff;}
button:disabled{background:#ff4c4c;color:#fff;cursor:not-allowed;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px;}
.btn-group button{flex:1;background:#11141f;color:#fff;}
.btn-group button:hover{background:#00ff7f;color:#0f0f10;}
.success{color:#00ff7f;font-weight:700;}
.failed{color:#ff4c4c;font-weight:700;}
.pending{color:#ffcc00;font-weight:700;}
.skipped{color:#9999ff;font-weight:700;}
.floodwait{background:#ffcc00;color:#000;font-weight:700;border-radius:6px;animation:blink 1.5s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0.5;}}
.console-log{background:#11141f;padding:10px;border-radius:12px;height:250px;overflow-y:auto;font-size:13px;margin-top:10px;}
.countdown{font-weight:700;}
.green{color:#00ff7f;}
.yellow{color:#ffcc00;}
.red{color:#ff4c4c;}
.progress-bar{background:#11141f;height:14px;border-radius:10px;margin-top:10px;}
.progress{background:#00ff7f;height:14px;width:0%;border-radius:10px;transition:width 0.3s;}
.table-responsive{overflow-x:auto;}
table{width:100%;border-collapse:collapse;margin-bottom:10px;}
th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#11141f;color:#00ff7f;text-align:left;}
</style>
</head>
<body>
<div class="container">

<!-- Navigation -->
<div class="btn-group">
  <button class="nav-btn" data-page="accountsPage">Accounts</button>
  <button class="nav-btn" data-page="autoAddPage">Auto Add</button>
  <button class="nav-btn" data-page="historyPage">History</button>
</div>

<!-- Accounts Table -->
<section id="accountsPage" class="page">
  <div class="card-title">Accounts Status</div>
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Phone</th>
          <th>Status</th>
          <th>FloodWait</th>
          <th>Last Checked</th>
        </tr>
      </thead>
      <tbody id="accountsTable"></tbody>
    </table>
  </div>
</section>

<!-- Auto Add -->
<section id="autoAddPage" class="page">
  <div class="card-title">Auto Add Members</div>
  <input id="sourceGroupInput" placeholder="Source Group Link"/>
  <input id="targetGroupInput" placeholder="Target Group (My Group)"/>
  <button id="startAutoAddBtn">Start Auto Add</button>
  <div id="autoAddStatus" class="pending"></div>
  <div id="autoAddCounter">0 / 0</div>
  <div class="progress-bar"><div id="autoAddProgress" class="progress"></div></div>
  <ul id="autoAddList"></ul>
  <div class="console-log" id="autoAddConsole"></div>
</section>

<!-- History -->
<section id="historyPage" class="page">
  <div class="card-title">History</div>
  <ul id="historyList"></ul>
  <button id="downloadHistoryBtn">Download History</button>
</section>

</div>

<script>
// ===== Navigation =====
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(btn.dataset.page).classList.add("active");
  }
});

// ===== Console Log =====
const autoAddConsole = document.getElementById("autoAddConsole");
function logConsole(msg){
  autoAddConsole.innerHTML += msg + "<br>";
  autoAddConsole.scrollTop = autoAddConsole.scrollHeight;
}

// ===== Accounts Table =====
const accountsTable = document.getElementById("accountsTable");
async function fetchAccounts(){
  const res = await fetch("/account-status");
  const data = await res.json();
  accountsTable.innerHTML="";
  const now = Date.now();
  Object.keys(data).forEach(id=>{
    const a = data[id];
    let floodText="-", countdownClass="green";
    if(a.floodWaitUntil && a.floodWaitUntil>now){
      const remain = Math.floor((a.floodWaitUntil-now)/1000);
      floodText = `${remain}s remaining | Ready: ${new Date(a.floodWaitUntil).toLocaleString()}`;
      countdownClass="red";
    }
    const lastChecked = new Date(a.lastChecked||now).toLocaleString();
    const tr = document.createElement("tr");
    tr.innerHTML=`<td>${id}</td><td>${a.phone}</td><td>${a.status}</td><td class="countdown ${countdownClass}">${floodText}</td><td>${lastChecked}</td>`;
    accountsTable.appendChild(tr);
  });
}
setInterval(fetchAccounts,1000);
fetchAccounts();

// ===== Auto Add Loop =====
const startAutoAddBtn = document.getElementById("startAutoAddBtn");
const sourceGroupInput = document.getElementById("sourceGroupInput");
const targetGroupInput = document.getElementById("targetGroupInput");
const autoAddStatus = document.getElementById("autoAddStatus");
const autoAddCounter = document.getElementById("autoAddCounter");
const autoAddProgress = document.getElementById("autoAddProgress");
const autoAddList = document.getElementById("autoAddList");

startAutoAddBtn.onclick = async () => {
  const source = sourceGroupInput.value.trim();
  const target = targetGroupInput.value.trim();
  if(!source || !target) return alert("Enter groups");

  startAutoAddBtn.disabled = true;
  autoAddStatus.innerText="Starting Auto Add...";
  autoAddConsole.innerHTML="";
  let offset=0, processed=0;

  while(true){
    const res = await fetch("/export-single-member",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({group:source, offset})
    });
    const data = await res.json();
    if(data.done) break;
    offset++;
    if(data.skipped) continue;
    const member = data.user;

    const checkRes = await fetch("/check-member",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:member.username,user_id:member.user_id,access_hash:member.access_hash,targetGroup:target})
    });
    const checkData = await checkRes.json();
    if(checkData.exists){
      logConsole(`[SKIP] ${member.username||member.user_id} already in target`);
      processed++; autoAddCounter.innerText=`${processed} / ?`;
      continue;
    }

    const addRes = await fetch("/add-member",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:member.username,user_id:member.user_id,access_hash:member.access_hash,targetGroup:target})
    });
    const result = await addRes.json();
    logConsole(`[ADD] ${member.username||member.user_id} → ${result.status}`);
    const li=document.createElement("li");
    li.innerHTML=`${member.username||member.user_id} → <span class="${result.status==='success'?'success':result.status==='failed'?'failed':'skipped'}">${result.status}</span>`;
    autoAddList.appendChild(li);

    processed++; autoAddCounter.innerText=`${processed} / ?`;
    autoAddProgress.style.width = `${processed*2}%`;

    if(result.status==="success"){
      autoAddStatus.innerText=`Waiting 20s after success...`;
      await new Promise(r=>setTimeout(r,20000));
    }
  }

  autoAddStatus.innerText="✅ Auto Add Finished";
  startAutoAddBtn.disabled = false;
};

// ===== History =====
const historyList = document.getElementById("historyList");
async function fetchHistory(){
  const res = await fetch("/history");
  const data = await res.json();
  historyList.innerHTML="";
  Object.values(data).forEach(h=>{
    const color = h.status==="success"?"success":h.status==="failed"?"failed":"skipped";
    const timeStr = new Date(h.timestamp).toLocaleTimeString();
    historyList.innerHTML+=`<li class="${color}">${h.username||h.user_id} → ${h.status}<br><span style="font-size:12px;">Reason: ${h.reason||'N/A'} | ${timeStr}</span></li>`;
  });
}
setInterval(fetchHistory,5000);
fetchHistory();

document.getElementById("downloadHistoryBtn").onclick = async ()=>{
  const res = await fetch("/history");
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data,null,2)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "history.json";
  a.click();
};
</script>
</body>
</html>
